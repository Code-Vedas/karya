---
detectors:
  UncommunicativeVariableName:
    accept:
      - e
      - t
      - _
  TooManyStatements:
    enabled: true
    max_statements: 25
  TooManyMethods:
    enabled: true
    max_methods: 30
  BooleanParameter:
    enabled: false
  ControlParameter:
    enabled: false
  TooManyConstants:
    enabled: true
    max_constants: 30
  LongParameterList:
    enabled: true
    max_params: 10
  TooManyInstanceVariables:
    enabled: true
    max_instance_variables: 10
  DataClump:
    enabled: false
  FeatureEnvy:
    enabled: true
    exclude:
      - Karya::WorkerSupervisor#reap_tracked_children
      - Karya::JobLifecycle::StateManager#merge_extension_transitions
      - Karya::WorkerSupervisor::ChildProcessRunner#mark_thread_stopped
  UtilityFunction:
    enabled: true
    exclude:
      - Karya::JobLifecycle::StateManager#initialize_base_transitions
      - Karya::JobLifecycle::StateManager#canonical_state?
exclude_paths:
  - spec/**/*
  - db/**/*
  - bin/*
  - config/**/*
  - vendor/**/*

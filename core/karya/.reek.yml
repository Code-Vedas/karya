---
detectors:
  UncommunicativeVariableName:
    accept:
      - e
      - t
      - _
  TooManyStatements:
    enabled: true
    max_statements: 25
  TooManyMethods:
    enabled: true
    max_methods: 30
  BooleanParameter:
    enabled: false
  ControlParameter:
    enabled: false
  TooManyConstants:
    enabled: true
    max_constants: 30
  LongParameterList:
    enabled: true
    max_params: 10
    exclude:
      - Karya::Worker::Configuration#initialize
      - Karya::Job::Attributes#normalized_attributes
  TooManyInstanceVariables:
    enabled: true
    max_instance_variables: 10
    exclude:
      - Karya::QueueStore::InMemory::StoreState
      - Karya::Worker::Configuration
  DataClump:
    enabled: false
  FeatureEnvy:
    enabled: true
    exclude:
      - Karya::WorkerSupervisor#reap_tracked_children
      - Karya::JobLifecycle::StateManager#merge_extension_transitions
      - Karya::WorkerSupervisor::ChildProcessRunner#mark_thread_stopped
      - Karya::QueueStore::InMemory::HandlerMatcher#normalize_present_handler_names
      - Karya::QueueStore::InMemory::RetrySupport#retry_pending_job
      - Karya::QueueStore::InMemory::RetrySupport#normalize_retry_policy
      - Karya::RetryPolicy#normalize_attempt
      - Karya::RetryPolicy#normalize_max_attempts
      - Karya::RetryPolicy#normalize_multiplier
      - Karya::RetryPolicy#normalize_non_negative_numeric
      - Karya::Worker::Configuration#normalize_retry_policy
  UtilityFunction:
    enabled: true
    exclude:
      - Karya::JobLifecycle::StateManager#initialize_base_transitions
      - Karya::JobLifecycle::StateManager#canonical_state?
  NilCheck:
    exclude:
      - Karya::QueueStore::InMemory::HandlerMatcher#initialize
exclude_paths:
  - spec/**/*
  - db/**/*
  - bin/*
  - config/**/*
  - vendor/**/*

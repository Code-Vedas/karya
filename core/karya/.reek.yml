---
detectors:
  UncommunicativeVariableName:
    accept:
      - e
      - t
      - _
  TooManyStatements:
    enabled: true
    max_statements: 25
  TooManyMethods:
    enabled: true
    max_methods: 30
  BooleanParameter:
    enabled: false
  ControlParameter:
    enabled: false
  TooManyConstants:
    enabled: true
    max_constants: 30
  LongParameterList:
    enabled: true
    max_params: 10
    exclude:
      - Karya::Worker::Configuration#initialize
  TooManyInstanceVariables:
    enabled: true
    max_instance_variables: 10
    exclude:
      - Karya::QueueStore::InMemory::Internal::StoreState
      - Karya::WorkerSupervisor::Configuration
  DataClump:
    enabled: false
  FeatureEnvy:
    enabled: true
    exclude:
      - Karya::WorkerSupervisor#reap_tracked_children
      - Karya::JobLifecycle::StateManager#merge_extension_transitions
      - Karya::WorkerSupervisor::ChildProcessRunner#mark_thread_stopped
      - Karya::RetryPolicy#normalize_attempt
      - Karya::RetryPolicy#normalize_max_attempts
      - Karya::RetryPolicy#normalize_multiplier
      - Karya::RetryPolicy#normalize_non_negative_numeric
      - Karya::Worker#execute_handler
      - Karya::QueueStore::InMemory::Internal::ExecutionSupport#finalized_execution_job
      - Karya::QueueStore::InMemory#store_and_requeue_if_needed
      - Karya::QueueStore::InMemory::Internal::UniquenessSupport#effective_retry_pending_uniqueness_job
  UtilityFunction:
    enabled: true
    exclude:
      - Karya::JobLifecycle::StateManager#initialize_base_transitions
      - Karya::JobLifecycle::StateManager#canonical_state?
      - Karya::Worker::Configuration#normalize_default_execution_timeout
      - Karya::QueueStore::InMemory::Internal::ExpirationSupport#job_expired?
      - Karya::QueueStore::InMemory::Internal::ExpirationSupport#build_expired_job
      - Karya::QueueStore::InMemory::Internal::ExecutionSupport#collect_expired_leases
      - Karya::QueueStore::InMemory::Internal::UniquenessSupport#uniqueness_scope_blocks_state?
      - Karya::QueueStore::InMemory::Internal::UniquenessSupport#incoming_uniqueness_state
      - Karya::QueueStore::InMemory::Internal::UniquenessSupport#reentry_conflict_job
      - Karya::QueueStore::InMemory::Internal::UniquenessSupport#lease_expired_for_uniqueness?
      - Karya::CircuitBreaker::PolicySet#policy_for_scope
  DuplicateMethodCall:
    exclude:
      - Karya::Worker#execute_handler
  NestedIterators:
    exclude:
      - Karya::QueueStore::InMemory::Internal::ExpirationSupport#expire_queued_jobs
  NilCheck:
    exclude:
      - Karya::Internal::RetryPolicyResolver#normalize
      - Karya::Internal::RetryPolicyResolver#self.normalize_policy_set
      - Karya::RetryPolicySet#policy_for
exclude_paths:
  - spec/**/*
  - db/**/*
  - bin/*
  - config/**/*
  - vendor/**/*

title: Karya
description: >-
  Karya is a Ruby-based background job and workflow system, composed of core and integration gems plus a dashboard frontend for development and operations.
baseurl: ""
domain: karya.codevedas.com
repository: Code-Vedas/karya
# Build settings
theme: just-the-docs
plugins:
  - jekyll-feed
  - kramdown
mermaid:
  version: 10.1.0
logo: /assets/images/logo.svg
callouts:
  note:
    title: Note
    color: blue
toc:
  depth: 2
  min_heading_level: 2
  max_heading_level: 3
aux_links:
  - title: " 🌙 / ☀️ "
    url: javascript:toggleTheme();
    new_tab: false
  - title: Repository
    url: https://github.com/Code-Vedas/karya
    new_tab: true
aux_links_new_tab: true
nav_enabled: true
heading_anchors: true
enable_copy_code_button: true

plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: true
  TargetRubyVersion: 3.2
  Exclude:
    - ".vscode/**/*"
    - "vendor/**/*"
    - "vendor/bundle/**/*"

Layout/LineLength:
  Max: 160

Metrics/MethodLength:
  Max: 60

Metrics/ModuleLength:
  Max: 300

Metrics/BlockLength:
  Max: 50

Metrics/ParameterLists:
  Max: 10

Metrics/ClassLength:
  Max: 275

Metrics/AbcSize:
  Max: 30

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 15

RSpec/MultipleExpectations:
  Max: 30

RSpec/ExampleLength:
  Max: 50

RSpec/MultipleMemoizedHelpers:
  Max: 15

RSpec/NestedGroups:
  Max: 5

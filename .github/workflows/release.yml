name: Release
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: true

env:
  RUBY_VERSION: 3.4.3
  NODE_VERSION: 24

jobs:
  verify_release:
    name: Verify release
    permissions:
      contents: read
    uses: ./.github/workflows/shared-ci.yml
    with:
      upload_coverage: false

  publish_karya:
    name: Publish core/karya
    runs-on: ubuntu-latest
    needs: [verify_release]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ github.workspace }}/core/karya
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@2d96c9b0fb0a666cfef43144609ab6f0f1c6c930
      - name: Build and push gem
        working-directory: ${{ github.workspace }}/core/karya
        run: |
          gem build karya.gemspec
          gem push karya-*.gem

  publish_karya_dashboard:
    name: Publish gems/karya-dashboard
    runs-on: ubuntu-latest
    needs: [publish_karya]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ github.workspace }}/gems/karya-dashboard
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@2d96c9b0fb0a666cfef43144609ab6f0f1c6c930
      - name: Install frontend dependencies
        working-directory: ${{ github.workspace }}/gems/karya-dashboard
        run: corepack yarn install --immutable
      - name: Prepackage dashboard assets
        working-directory: ${{ github.workspace }}/gems/karya-dashboard
        run: corepack yarn prepackage-build
      - name: Build and push gem
        working-directory: ${{ github.workspace }}/gems/karya-dashboard
        run: |
          gem build karya-dashboard.gemspec
          gem push karya-dashboard-*.gem
